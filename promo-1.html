<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KEVIN SOLO-OS 宣传图 1</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            width: 1080px;
            height: 1080px;
            background: linear-gradient(135deg, #000000 0%, #1a1a1a 100%);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 80px;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft YaHei", sans-serif;
        }
        .label {
            font-size: 24px;
            color: #999;
            letter-spacing: 4px;
            margin-bottom: 40px;
            text-transform: uppercase;
        }
        .title {
            font-size: 96px;
            font-weight: 900;
            color: #ffffff;
            text-align: center;
            line-height: 1.1;
            margin-bottom: 40px;
            letter-spacing: -2px;
        }
        .subtitle {
            font-size: 36px;
            color: #cccccc;
            text-align: center;
            margin-bottom: 60px;
        }
        .tagline {
            font-size: 42px;
            font-weight: 700;
            color: #ffffff;
            text-align: center;
            margin-bottom: 80px;
            padding: 30px 60px;
            border: 3px solid #ffffff;
        }
        .price {
            font-size: 72px;
            font-weight: 900;
            color: #ffffff;
            text-align: center;
        }
        .price-period {
            font-size: 36px;
            color: #999;
        }
    </style>
</head>
<body>
    <div class="label">SOLO ENTREPRENEUR OS</div>
    <div class="title">KEVIN<br>SOLO-OS</div>
    <div class="subtitle">一人企业操作系统</div>
    <div class="tagline">我不教你赚钱<br>我帮你省时间、少走弯路</div>
    <div class="price">¥99<span class="price-period">/年</span></div>
</body>
</html>
