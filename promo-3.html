<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KEVIN SOLO-OS 宣传图 3</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            width: 1080px;
            height: 1080px;
            background: #000000;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 80px;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft YaHei", sans-serif;
            color: #ffffff;
        }
        .header {
            font-size: 28px;
            color: #999;
            letter-spacing: 3px;
            margin-bottom: 40px;
            text-transform: uppercase;
        }
        .main-title {
            font-size: 56px;
            font-weight: 900;
            color: #ffffff;
            text-align: center;
            margin-bottom: 60px;
        }
        .price-box {
            background: #ffffff;
            color: #000000;
            padding: 60px 80px;
            margin-bottom: 60px;
            text-align: center;
        }
        .price {
            font-size: 96px;
            font-weight: 900;
            line-height: 1;
        }
        .price-period {
            font-size: 42px;
            color: #666;
        }
        .features {
            width: 100%;
            text-align: center;
            margin-bottom: 60px;
        }
        .feature-item {
            font-size: 28px;
            color: #cccccc;
            margin-bottom: 20px;
            padding: 15px 0;
            border-bottom: 1px solid #333;
        }
        .cta {
            font-size: 36px;
            font-weight: 700;
            color: #000000;
            background: #ffffff;
            padding: 30px 80px;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="header">[PRICING]</div>
    <div class="main-title">简单透明的定价</div>

    <div class="price-box">
        <div class="price">¥99<span class="price-period">/年</span></div>
    </div>

    <div class="features">
        <div class="feature-item">✓ 完整翻译内容库访问权限</div>
        <div class="feature-item">✓ 每周更新最新商业思维</div>
        <div class="feature-item">✓ 50+ 实战框架和清单</div>
        <div class="feature-item">✓ 100+ 本地化执行指南</div>
    </div>

    <div class="cta">立即订阅 →</div>
</body>
</html>
