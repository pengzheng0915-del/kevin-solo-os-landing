<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KEVIN SOLO-OS 宣传图 2</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            width: 1080px;
            height: 1080px;
            background: #ffffff;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 80px;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft YaHei", sans-serif;
        }
        .header {
            font-size: 28px;
            color: #666;
            letter-spacing: 3px;
            margin-bottom: 40px;
            text-transform: uppercase;
        }
        .main-title {
            font-size: 56px;
            font-weight: 900;
            color: #000000;
            text-align: center;
            margin-bottom: 80px;
        }
        .benefit {
            width: 100%;
            margin-bottom: 50px;
            padding: 40px;
            border: 3px solid #000000;
        }
        .benefit-number {
            font-size: 48px;
            font-weight: 900;
            color: #000000;
            margin-bottom: 20px;
        }
        .benefit-title {
            font-size: 36px;
            font-weight: 700;
            color: #000000;
            margin-bottom: 15px;
        }
        .benefit-desc {
            font-size: 24px;
            color: #333333;
            line-height: 1.6;
        }
    </style>
</head>
<body>
    <div class="header">[CORE VALUE]</div>
    <div class="main-title">三大核心价值</div>

    <div class="benefit">
        <div class="benefit-number">[01]</div>
        <div class="benefit-title">直接看第一手内容</div>
        <div class="benefit-desc">翻译 Dan Koe、Naval 的真实思考，不是二手鸡汤</div>
    </div>

    <div class="benefit">
        <div class="benefit-number">[02]</div>
        <div class="benefit-title">省下几年摸索时间</div>
        <div class="benefit-desc">把我踩过的坑和经验给你，不用重复错误</div>
    </div>

    <div class="benefit">
        <div class="benefit-number">[03]</div>
        <div class="benefit-title">不被割韭菜</div>
        <div class="benefit-desc">我不教赚钱，只帮你看懂大师在说什么</div>
    </div>
</body>
</html>
